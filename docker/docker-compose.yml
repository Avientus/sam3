# ============================================================
# docker-compose.yml — SAM3 Inference Server on Jetson Orin
# Tested on: JetPack 6.2.1 / L4T R36.4.3
#
# Usage:
#   docker compose up -d          # start in background
#   docker compose logs -f        # follow logs
#   docker compose down           # stop
#
# Before starting, place your sam3.pt at ./models/sam3.pt
# ============================================================

services:
  sam3:
    build:
      context: .
      dockerfile: Dockerfile

    image: sam3-jetson:latest
    container_name: sam3

    # ── NVIDIA GPU access ────────────────────────────────────
    # Jetson uses unified memory — nvmap/tegra devices must be
    # passed through explicitly for CUDA to initialise.
    runtime: nvidia
    privileged: true          # required for nvmap on Jetson
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - SAM3_MODEL_PATH=/app/models/sam3.pt
      - TOKENIZERS_PARALLELISM=false

    # ── Jetson-specific device nodes ─────────────────────────
    devices:
      - /dev/nvmap:/dev/nvmap
      - /dev/dri:/dev/dri

    # ── Port: accessible from anywhere on the network ────────
    ports:
      - "8000:8000"
      - "8001:8001"

    # ── Volumes ──────────────────────────────────────────────
    volumes:
      - ./models:/app/models:ro
      - ./outputs:/app/outputs
      # Lets the NVIDIA runtime identify the Jetson board
      - /etc/nv_tegra_release:/etc/nv_tegra_release:ro

    # ── Memory settings for Jetson ───────────────────────────
    shm_size: "2gb"

    # ── Restart policy ───────────────────────────────────────
    restart: unless-stopped

    # ── Healthcheck ──────────────────────────────────────────
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

    # ── Logging ──────────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
